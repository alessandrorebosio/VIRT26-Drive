<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accept Your Invitation</title>
    <!--[if mso]>
    <style type="text/css">
        body, table, td, p, a { font-family: Arial, Helvetica, sans-serif !important; }
    </style>
    <![endif]-->
</head>

<body
    style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f9f9f9; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">

    <!-- Main Background Table -->
    <table border="0" cellpadding="0" cellspacing="0" width="100%" bgcolor="#f9f9f9"
        style="background-color: #f9f9f9; table-layout: fixed;">
        <tr>
            <td align="center" style="padding-top: 40px; padding-bottom: 40px;">

                <!--[if mso]>
                <table align="center" border="0" cellspacing="0" cellpadding="0" width="600">
                <tr>
                <td align="center" valign="top" width="600">
                <![endif]-->

                <table border="0" cellpadding="0" cellspacing="0" width="100%" bgcolor="#ffffff"
                    style="background-color: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; max-width: 600px; width: 100%;">

                    <!-- Top Spacer -->
                    <tr>
                        <td height="30" style="font-size: 1px; line-height: 1px;">&nbsp;</td>
                    </tr>

                    <tr>
                        <td align="left" style="padding-left: 30px; padding-right: 30px;">

                            <!-- Header -->
                            <h2
                                style="color: #6F65C2; margin: 0; font-size: 24px; font-weight: bold; line-height: 32px;">
                                Welcome!
                            </h2>

                            <!-- Spacer -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td height="20" style="font-size: 1px; line-height: 1px;">&nbsp;</td>
                                </tr>
                            </table>

                            <!-- Description 1 -->
                            <p style="color: #333333; font-size: 15px; line-height: 24px; margin: 0;">
                                An administrator has invited you to create an account on our platform.
                            </p>

                            <!-- Spacer -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td height="15" style="font-size: 1px; line-height: 1px;">&nbsp;</td>
                                </tr>
                            </table>

                            <!-- Description 2 -->
                            <p style="color: #333333; font-size: 15px; line-height: 24px; margin: 0;">
                                To accept the invitation and set up your password, click the button below:
                            </p>

                            <!-- Button Container Spacer -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td height="35" style="font-size: 1px; line-height: 1px;">&nbsp;</td>
                                </tr>
                            </table>

                            <!-- Button Table -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center">
                                        <table border="0" cellpadding="0" cellspacing="0"
                                            style="border-collapse: separate;">
                                            <tr>
                                                <td align="center" bgcolor="#6F65C2"
                                                    style="border-radius: 5px; background-color: #6F65C2;">
                                                    <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=invite&next=/auth/reset-password" target="_blank"
                                                        style="font-size: 16px; font-family: Arial, sans-serif; color: #ffffff; text-decoration: none; padding: 12px 24px; border-radius: 5px; border: 1px solid #6F65C2; display: inline-block; font-weight: bold;">
                                                        Accept Invitation
                                                    </a>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                        </td>
                    </tr>

                    <!-- Bottom Spacer -->
                    <tr>
                        <td height="40" style="font-size: 1px; line-height: 1px;">&nbsp;</td>
                    </tr>

                </table>

                <!--[if mso]>
                </td>
                </tr>
                </table>
                <![endif]-->

            </td>
        </tr>
    </table>
</body>

</html>

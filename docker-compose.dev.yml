name: drive-dev

services:
  web:
    container_name: web-app-dev
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - supabase_network_drive-dev

networks:
  supabase_network_drive-dev:
    external: true
